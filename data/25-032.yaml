abstract:
- content: This discussion paper discusses the sustainability of 3D city model development,
    utilization, and publication through the localization of CityGML, based on the
    practices in PLATEAU. Section 2 introduces the relevant activities in Japan that
    provide background for the project. Section 3 explains the standards and the methods
    for their localization. Section 4 presents an overview of the PLATEAU ecosystem
    and the initiatives that support its implementation. Finally,Section 5 discusses
    insights gained from Sections 3 and Section 4, as well as future prospects.
