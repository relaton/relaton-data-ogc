  content: "This Engineering Report was prepared as a deliverable for the OGC Web
    Services, Phase\r\n9 (OWS-9) initiative of the OGC Interoperability Program. The
    document presents the\r\nwork completed with respect to the Conformance & Interoperability
    Testing &\r\nEvaluation sub-thread within OWS-9.\r\nThis Engineering Report describes
    and evaluates the specification of WCS 2.0 core\r\ncorrigenda and extensions’
    Abstract Test Suite (ATS) and the implementation of ETS for\r\nuse within an OGC
    SOA processing chain."
