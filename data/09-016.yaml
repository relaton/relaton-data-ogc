  content: This OGC® document reports the results achieved in the Decision Support
    Services (DSS) subtask of the OWS-6 testbed initiative as it relates to the extension
    of the OGC Symbology Encoding (SE) symbology format for improved capability and
    harmonization with ISO 19117 symbology, International Hydrographic Organization
    S-52 symbology, USGS Topomap symbology, and Homeland Security Emergency Management
    symbology.
