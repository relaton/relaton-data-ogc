abstract:
- language: en
  script: Latn
  content: The intended audience of this document is a developer of software for creating
    and consuming geo=registered PDF documents that conform to PDF geo-registration
    2.2. It specifies how to create the necessary PDF objects that identify a region
    of the PDF page as a map and describe the map’s coordinate systems. Map creation
    and rendering to a PDF page are not addressed. The underlying PDF file format
    is not addressed. The file format is specified in PDF Reference[1] .
