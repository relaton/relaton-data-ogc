  script: Latn
  content: 'The reason for developing this specification was a WAMI community requirement
    to deliver high performance web services and disseminate WAMI products. While
    existing web services can be combined or modified to deliver some of the functionality
    of the services described in this document, by design, they cannot deliver the
    desired performance. '
