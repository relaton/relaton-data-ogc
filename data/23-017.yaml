abstract:
- content: "This OGC Geospatial User Feedback Conceptual Model. v.2.0 Standard defines
    an enhanced version of the Geospatial User Feedback (GUF) model (Version 1.0 of
    the model can be found in OGC 15-097r1 [7]). Geospatial User Feedback (GUF) is
    metadata that is predominantly produced by the consumers of geospatial data products
    as they use and gain experience with those products. GUF v.2.0 extends the original
    conceptual model mainly by including the description of reproducible usage of
    a resource.\r\n\r\nThis OGC Standard complements existing metadata conventions
    whereby documents recording dataset characteristics and production workflows are
    generated by the creator, publisher, or curator of a data product. As a part of
    metadata, the GUF data model reuses some elements of ISO 19115-1:2014 (the updated
    version of the OGC Abstract Specification topic 11) but not the general structure.
    This selective use of ISO metadata elements prioritizes future interoperability
    with ISO metadata models that may be done in future revisions of ISO 19115-1.\r\n\r\nThis
    standard is designed to be used in combination with an encoding standard. An XML
    encoding for version 2.0 of the conceptual model that is conformant with the ISO19139
    encoding rules is specified as a separate OGC Standard (OGC 23-061, OGC Geospatial
    User Feedback Standard: XML Encoding Extension. v.2.0 [8]). In the near future
    a JSON encoding will also be developed."
