abstract:
- language: en
  script: Latn
  content: 'This document specifies the interface to a Feature Portrayal Service (FPS),
    which applies styles to digital features to produce a map image. The styles applied
    are identified or specified by the client, and are applied to digital feature
    data retrieved from a Web Feature Service (WFS) identified by the client. '
