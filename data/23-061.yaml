abstract:
- content: The OGC Geospatial User Feedback Standard version 2 — XML Encoding Extension
    is based on the OGC Geospatial User Feedback conceptual model [2]. Geospatial
    User Feedback (GUF) is metadata that is produced primarily by the consumers of
    geospatial data products based on their use and experience with those products.
    The GUF Standards complement the existing metadata conventions whereby documents
    recording dataset characteristics and production workflows are generated by the
    creator, publisher or curator of a data product. As a part of metadata, the GUF
    data model internally reuses some elements of ISO 19115-1 (the updated version
    of the OGC Abstract Specification topic 11) but not the general structure. This
    selective use of ISO metadata elements prioritizes future interoperability with
    developing ISO metadata models.
