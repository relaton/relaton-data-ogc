- language: en
  script: Latn
  content: "This OGC® document describes the architecture implemented in the OWS-9
    Aviation thread, including:\r\n•\tA description of the architecture used for the
    implementation of the OWS-9 Aviation Use Cases.\r\n•\tAn overview of the implemented
    components and workflows followed by a short description of each component. \r\n•\tA
    discussion about discovery and registry methods and practices.\r\n•\tDocumentation
    of the issues, lessons learned as well as accomplishments and scenarios that were
    of general interest in the Aviation thread.\r\nMore detailed information on specific
    aspects considered in OWS-9 Aviation may be found in the individual Aviation Engineering
    Reports.\r\n"
