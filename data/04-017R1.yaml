  content: The OGC Catalogue Services 2.0 specification (OGC 04-021) establishes a
    framework for implementing catalogue services that can meet the needs of stakeholders
    in a wide variety of application domains. This application profile is based on
    the CSW schemas for web-based catalogues and it complies with the requirements
    of clause 11 in OGC 04-021.
