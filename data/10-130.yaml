  content: This document describes the integration results of deploying OGC Web Services
    on the FAA chosen Enterprise Service Bus (ESB) - FUSE. Snowflake Software were
    commissioned to evaluate the impacts of the FAA SWIM security requirements for
    both secure messaging and user authentication and gain an understanding of the
    requirements for deploying OGC web services into the Apache FUSE Enterprise Service
    Bus (ESB).
