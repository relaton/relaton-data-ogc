abstract:
- language: en
  script: Latn
  content: This Discussion paper introduces the Sensor Instance Registry (SIR), a
    web service interface for managing the metadata and status information of sensors.
    Furthermore this service is capable of automatically harvesting sensor metadata,
    transforming the collected metadata sets into a data model compatible to OGC Catalogs
    and to push harvested metadata into OGC Catalog instances.
