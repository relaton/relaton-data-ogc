abstract:
- language: en
  script: Latn
  content: This OGC® document describes the Workflow Architecture developed in support
    of Geoprocessing Workflow and Sensor Web Enablement threads of OWS-5.  This information
    includes the overall architecture description, concepts, and issues.  It also
    provides detail on the Conflation Workflow created as an example implementation
    for geoprocessing in a workflow.  This document establishes a sample architecture
    and associated lessons learned as general guidance.
