abstract:
- content: "OGC openEO Processes Community Standard, this specification\r\nopenEO
    specifies an open application programming interface (API) for connecting applications
    and other client software to big\r\nEarth observation cloud back-ends in a simple
    and unified way.\r\nThe openEO specification aims at increasing the interoperability
    of big EO data processing of satellite imagery in the cloud.\r\nImplementations
    of openEO can be used to add an interoperability layer on top of existing services.
    Its development has been\r\ndriven by the need to overcome the challenges associated
    with different tools, APIs, and data formats in geospatial technology.\r\nopenEO
    has been developed from the bottom up, with each version of the specification
    supported by implementations.\r\nThe primary use case for specifying openEO was
    to simplify and unify the data processing using a common API and a\r\nspecification
    for a set of pre-defined processes. As such, users can still work in their favored
    programming language without\r\nworrying about data organization and pre-processing.
    Users can avoid vendor lock-in as the generated process descriptions\r\ncan be
    executed at multiple provider endpoints, making it easier to compare and reproduce
    processing results between\r\ndifferent providers."
