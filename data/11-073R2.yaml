  script: Latn
  content: "The scope of this guidelines report is to provide:\r\n1.\tOverview of
    the OGC WFS 2.0 standard\r\n2.\tRecommendations for a minimum set of operations
    and behaviours that should be supported to ensure consistency across software
    implementations.  \r\n3.\tGuidance for configuring the WFS 2.0 to retrieve AIXM
    5.1 data \r\n4.\tSummary of potential improvements to WFS/FE 2.0, GML and AIXM
    5.1 specifications to better support aeronautical use cases\r\n"
