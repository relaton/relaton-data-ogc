abstract:
- language: en
  script: Latn
  content: This OGC® document reports the results achieved in the Decision Support
    Services (DSS) subtask of the OWS-6 testbed initiative as it relates to the harmonization
    of OGC Styled Layer Descriptor (SLD) and Symbology Encoding (SE) symbology formats
    with ISO 19117 symbology format, International Hydrographic Organization S-52
    symbology, USGS Topomap symbology, and Homeland Security Emergency Management
    symbology.
