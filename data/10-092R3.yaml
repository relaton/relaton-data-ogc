- language: en
  script: Latn
  content: This document defines an OGC® Standard for encoding binary representations
    of space-time varying geo-referenced data. Specifically, this standard specifies
    the netCDF classic and 64-bit offset file binary encoding formats. This standard
    specifies a set of requirements that every netCDF classic or 64-bit offset binary
    encoding must fulfil.
