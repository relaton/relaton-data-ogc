- language: en
  script: Latn
  content: This OGC Discussion Paper provides guidelines on how to create a specification
    of a conceptual model through use of a Unified Modeling Language (UML) editor
    and an AsciiDoc compiler. This document references Sparx Systems Enterprise Architect
