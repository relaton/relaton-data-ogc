abstract:
- language: en
  script: Latn
  content: he Operational Capacity Guide aims to provide disaster and emergency management
    communities with a set of incremental strategic actions to help them develop and
    enhance the infrastructure, training, support, and operational processes needed
    to deliver an effective and efficient geospatial response to disaster events.
    This guide was produced as part of the Open Geospatial Consortium’s Disaster Pilot
    2023 initiative.
