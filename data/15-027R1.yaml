  content: "This OGC Engineering Report (ER) is a deliverable of the OGC Testbed 11.
    This ER describes the Digital Notice to Airmen (NOTAM) enrichment and validation
    services in the Testbed 11 Aviation thread, including:\r\n•\tA description of
    the architecture and architectural options.\r\n•\tAn overview of the implemented
    components and workflows followed by a short description of each component.\r\n•\tDocumentation
    of the issues, lessons learned as well as accomplishments and scenarios that were
    of general interest in the Aviation thread.\r\nMore detailed information on other
    specific aspects considered in OWS-11 Aviation may be found in the individual
    Aviation Engineering Reports.\r\n"
