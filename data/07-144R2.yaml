  script: Latn
  content: This OGC® document is a companion to the CSW-ebRIM catalogue profile (OGC
    07-110r2). It specifies the content of the Basic extension package that shall
    be supported by all conforming services. The package includes extension elements
    of general utility that may be used to characterize a wide variety of geographic
    information resources, with a focus on service-oriented metadata management.
