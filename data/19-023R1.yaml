  content: This OGC Testbed 15 Engineering Report (ER) describes a style encoding
    and metadata conceptual model that provides information for understanding styles
    intended usage, availability, compatibility with existing layers, and supporting
    style search. A style is a sequence of rules of symbolizing instructions to be
