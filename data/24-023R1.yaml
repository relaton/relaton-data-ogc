abstract:
- content: "Geospatial User Feedback is metadata that is predominantly produced by
    the consumers of geospatial data products based on their use and experience with
    those products. The GUF Standard complements the existing metadata conventions
    whereby documents recording dataset characteristics and production workflows are
    generated by the creator, publisher or curator of a data product. As a part of
    metadata, the GUF data model internally reuses some elements of ISO 19115-1 (the
    updated version of the OGC Abstract Specification Topic 11 — Metadata) but not
    the general structure. This selective use of ISO metadata elements prioritizes
    future interoperability with developing ISO metadata models.\r\n\r\n"
