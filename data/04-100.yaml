abstract:
- language: en
  script: Latn
  content: "The OWS-2 Application Schema Development Discussion Paper describes the
    process for creating ISO 19109:2005 Application Schemas [http://www.iso.org/iso/iso_catalogue/catalogue_tc/catalogue_detail.htm?csnumber=39891]
    in UML. It also describes the process used during the OWS-2 Initiative [http://www.opengeospatial.org/projects/initiatives/ows-2]
    for creating GML [http://www.opengeospatial.org/standards/gml] Application Schemas
    from ISO 19109:2005 Application Schemas.\r\n\r\nSee also the GML pages on OGC
    Network: http://www.ogcnetwork.net/gml .\r\n"
