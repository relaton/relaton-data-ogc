  script: Latn
  content: "This document is a deliverable of the OGC Testbed 10 (Testbed-10). This
    document describes the\r\narchitecture that was implemented in the Testbed-10
    Aviation thread. Additionally, it provides\r\ndescriptions of all software components
    involved in the Aviation architecture as well as a\r\ndedicated chapter focusing
    on the evaluation and design of FIXM 2.0. Here, a special focus lies\r\non the
    integration into the data provisioning components, namely the Web Feature and
    Event\r\nServices."
